  .tabbar-label{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
  .brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.14rem;color:var(--ink);letter-spacing:-.01em;margin-right:2px}
  .brand-accent{color:#E8836F}
  .tabs{position:relative;display:flex;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:0 10px 28px -10px rgba(39,34,29,.22),0 2px 6px rgba(39,34,29,.07)}
  .tab-indicator{position:absolute;top:4px;bottom:4px;left:4px;width:calc(50% - 4px);background:var(--coral);border-radius:999px;transition:transform .32s cubic-bezier(.65,0,.35,1),background-color .32s ease;z-index:0}
  .tab{position:relative;z-index:1;appearance:none;-webkit-appearance:none;border:0;background:transparent;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:.78rem;letter-spacing:.01em;padding:10px 16px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:color .2s;-webkit-tap-highlight-color:transparent}
  .tab svg{width:15px;height:15px;flex:0 0 auto;transition:transform .32s cubic-bezier(.65,0,.35,1)}
  .tab:active svg{transform:scale(.85)}
  .tab[aria-selected="true"]{color:#fff;font-weight:600}
  .tab:not([aria-selected="true"]):hover{color:var(--ink)}
  .frames{position:relative;flex:1 1 auto;min-height:0}
  .frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:transparent}
  .frames iframe[hidden]{display:none}
</style>
</head>
<body>
  <main class="frames">
    <iframe id="parla" title="Esami alterati" src="esami-primo-livello-osteoporosi-secondaria.html"></iframe>
    <iframe id="tace" title="Esami normali" src="prototipo-laboratorio-tace.html" hidden></iframe>
  </main>
  <nav class="tabbar">
    <div class="tabs" role="tablist" aria-label="Strumenti">
      <span class="tab-indicator" aria-hidden="true"></span>
      <button class="tab" role="tab" id="tab-parla" aria-controls="parla" aria-selected="true" data-target="parla" data-color="var(--coral)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>
        <span>Alterati</span>
      </button>
      <button class="tab" role="tab" id="tab-tace" aria-controls="tace" aria-selected="false" data-target="tace" data-color="var(--teal)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12.5 2.5 2.5 5-5"/></svg>
        <span>Normali</span>
      </button>
    </div>
    <span class="tabbar-label">Esami I livello</span>
  </nav>
  <script>
    (function(){
      var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));
      var frames = { parla: document.getElementById('parla'), tace: document.getElementById('tace') };
      var indicator = document.querySelector('.tab-indicator');
      function select(target){
        tabs.forEach(function(t, i){
          var on = t.dataset.target === target;
          t.setAttribute('aria-selected', on ? 'true' : 'false');
          if(on && indicator){
            indicator.style.transform = 'translateX(' + (i * 100) + '%)';
            indicator.style.background = t.dataset.color;
          }
        });
        Object.keys(frames).forEach(function(k){ frames[k].hidden = (k !== target); });
      }
      tabs.forEach(function(t){
        t.addEventListener('click', function(){ select(t.dataset.target); });
        t.addEventListener('keydown', function(e){
          if(e.key === 'ArrowRight' || e.key === 'ArrowLeft'){
            e.preventDefault();
            var i = tabs.indexOf(t);
            var n = e.key === 'ArrowRight' ? (i + 1) % tabs.length : (i - 1 + tabs.length) % tabs.length;
            tabs[n].focus(); select(tabs[n].dataset.target);
          }
        });
      });
    })();
  </script>
</body>
