<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Osteo Help — Screening osteoporosi secondaria</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<meta name="theme-color" content="#1C6E7E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Osteo Help">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#1C6E7E; --teal-soft:#DCEEF0; --bg:#FAF3E9; --line:#EADBC6; --ink:#27221D; --ink-soft:#6A5F54; --surface:#FFFFFF; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{display:flex;flex-direction:column;min-height:100%;background:var(--bg);font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-text-size-adjust:100%}
  .topbar{display:flex;align-items:center;justify-content:flex-start;padding:9px 16px;padding-top:max(9px,env(safe-area-inset-top));background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .tabbar{display:flex;justify-content:center;padding:8px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--line);position:sticky;bottom:0;z-index:10}
  .brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.14rem;color:var(--ink);letter-spacing:-.01em;margin-right:2px}
  .brand-accent{color:#E8836F}
  .tabs{display:flex;gap:8px}
  .tab{appearance:none;-webkit-appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:.8rem;letter-spacing:.01em;padding:8px 14px;border-radius:999px;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .tab:hover{border-color:var(--ink-soft)}
  .tab[aria-selected="true"]{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}
  .frames{position:relative;flex:1 1 auto;min-height:0}
  .frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:var(--bg)}
  .frames iframe[hidden]{display:none}
</style>
</head>
<body>
  <header class="topbar">
    <span class="brand">Osteo <span class="brand-accent">Help</span></span>
  </header>
  <main class="frames">
    <iframe id="parla" title="Esami alterati" src="esami-primo-livello-osteoporosi-secondaria.html"></iframe>
    <iframe id="tace" title="Esami normali" src="prototipo-laboratorio-tace.html" hidden></iframe>
  </main>
  <nav class="tabbar">
    <div class="tabs" role="tablist" aria-label="Strumenti">
      <button class="tab" role="tab" id="tab-parla" aria-controls="parla" aria-selected="true" data-target="parla">Esami alterati</button>
      <button class="tab" role="tab" id="tab-tace" aria-controls="tace" aria-selected="false" data-target="tace">Esami normali</button>
    </div>
  </nav>
  <script>
    (function(){
      var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));
      var frames = { parla: document.getElementById('parla'), tace: document.getElementById('tace') };
      function select(target){
        tabs.forEach(function(t){ t.setAttribute('aria-selected', t.dataset.target === target ? 'true' : 'false'); });
        Object.keys(frames).forEach(function(k){ frames[k].hidden = (k !== target); });
      }
      tabs.forEach(function(t){
        t.addEventListener('click', function(){ select(t.dataset.target); });
        t.addEventListener('keydown', function(e){
          if(e.key === 'ArrowRight' || e.key === 'ArrowLeft'){
            e.preventDefault();
            var i = tabs.indexOf(t);
            var n = e.key === 'ArrowRight' ? (i + 1) % tabs.length : (i - 1 + tabs.length) % tabs.length;
            tabs[n].focus(); select(tabs[n].dataset.target);
          }
        });
      });
    })();
  </script>
</body>
</html>
